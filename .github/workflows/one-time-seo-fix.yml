name: One-time SEO metadata fix

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-seo-metadata:
    if: contains(github.event.head_commit.message, '[seo-fix]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch hreflang, language switchers and dossier schemas
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import re

          TODAY = "2026-05-30"
          SITE = "https://alexander.forum"

          pairs = {
              "resilienz/index.html": {
                  "self": f"{SITE}/resilienz/",
                  "other": f"{SITE}/en/resilience/",
                  "self_lang": "de",
                  "other_lang": "en",
                  "x_default": f"{SITE}/resilienz/",
                  "switch_href": "/en/resilience/",
                  "switch_lang": "en",
                  "switch_label": "Switch to English",
                  "switch_text": "EN",
              },
              "en/resilience/index.html": {
                  "self": f"{SITE}/en/resilience/",
                  "other": f"{SITE}/resilienz/",
                  "self_lang": "en",
                  "other_lang": "de",
                  "x_default": f"{SITE}/resilienz/",
                  "switch_href": "/resilienz/",
                  "switch_lang": "de",
                  "switch_label": "Auf Deutsch wechseln",
                  "switch_text": "DE",
              },
              "gleichzeitigkeit/index.html": {
                  "self": f"{SITE}/gleichzeitigkeit/",
                  "other": f"{SITE}/en/era-of-simultaneity/",
                  "self_lang": "de",
                  "other_lang": "en",
                  "x_default": f"{SITE}/gleichzeitigkeit/",
                  "switch_href": "/en/era-of-simultaneity/",
                  "switch_lang": "en",
                  "switch_label": "Switch to English",
                  "switch_text": "EN",
              },
              "en/era-of-simultaneity/index.html": {
                  "self": f"{SITE}/en/era-of-simultaneity/",
                  "other": f"{SITE}/gleichzeitigkeit/",
                  "self_lang": "en",
                  "other_lang": "de",
                  "x_default": f"{SITE}/gleichzeitigkeit/",
                  "switch_href": "/gleichzeitigkeit/",
                  "switch_lang": "de",
                  "switch_label": "Auf Deutsch wechseln",
                  "switch_text": "DE",
              },
              "publikationen/index.html": {
                  "self": f"{SITE}/publikationen/",
                  "other": f"{SITE}/en/publications/",
                  "self_lang": "de",
                  "other_lang": "en",
                  "x_default": f"{SITE}/publikationen/",
                  "switch_href": "/en/publications/",
                  "switch_lang": "en",
                  "switch_label": "Switch to English",
                  "switch_text": "EN",
              },
              "en/publications/index.html": {
                  "self": f"{SITE}/en/publications/",
                  "other": f"{SITE}/publikationen/",
                  "self_lang": "en",
                  "other_lang": "de",
                  "x_default": f"{SITE}/publikationen/",
                  "switch_href": "/publikationen/",
                  "switch_lang": "de",
                  "switch_label": "Auf Deutsch wechseln",
                  "switch_text": "DE",
              },
              "ueber-uns/index.html": {
                  "self": f"{SITE}/ueber-uns/",
                  "other": f"{SITE}/en/about/",
                  "self_lang": "de",
                  "other_lang": "en",
                  "x_default": f"{SITE}/ueber-uns/",
                  "switch_href": "/en/about/",
                  "switch_lang": "en",
                  "switch_label": "Switch to English",
                  "switch_text": "EN",
              },
              "en/about/index.html": {
                  "self": f"{SITE}/en/about/",
                  "other": f"{SITE}/ueber-uns/",
                  "self_lang": "en",
                  "other_lang": "de",
                  "x_default": f"{SITE}/ueber-uns/",
                  "switch_href": "/ueber-uns/",
                  "switch_lang": "de",
                  "switch_label": "Auf Deutsch wechseln",
                  "switch_text": "DE",
              },
              "warum-alexander/index.html": {
                  "self": f"{SITE}/warum-alexander/",
                  "other": f"{SITE}/en/why-alexander/",
                  "self_lang": "de",
                  "other_lang": "en",
                  "x_default": f"{SITE}/warum-alexander/",
                  "switch_href": "/en/why-alexander/",
                  "switch_lang": "en",
                  "switch_label": "Switch to English",
                  "switch_text": "EN",
              },
              "en/why-alexander/index.html": {
                  "self": f"{SITE}/en/why-alexander/",
                  "other": f"{SITE}/warum-alexander/",
                  "self_lang": "en",
                  "other_lang": "de",
                  "x_default": f"{SITE}/warum-alexander/",
                  "switch_href": "/warum-alexander/",
                  "switch_lang": "de",
                  "switch_label": "Auf Deutsch wechseln",
                  "switch_text": "DE",
              },
          }

          schemas = {
              "resilienz/index.html": {
                  "@context": "https://schema.org",
                  "@type": ["Article", "Report"],
                  "@id": f"{SITE}/resilienz/#dossier",
                  "url": f"{SITE}/resilienz/",
                  "headline": "Resilienz – Interdisziplinäre Analyse und Zukunftskompetenz",
                  "description": "Interdisziplinäres Grundlagendossier zu Resilienz: von neurobiologischen Grundlagen über psychologische Entwicklung bis zu gesellschaftlicher Transformation.",
                  "author": {"@type": "Organization", "name": "Alexander Forum für Reflexion & Resilienz", "url": f"{SITE}/"},
                  "publisher": {"@type": "Organization", "name": "Alexander Forum für Reflexion & Resilienz", "url": f"{SITE}/", "logo": {"@type": "ImageObject", "url": f"{SITE}/AF-Logo-final.svg"}},
                  "datePublished": "2025-10-01",
                  "dateModified": TODAY,
                  "inLanguage": "de-AT",
                  "about": ["Resilienz", "Psychologie", "Neurobiologie", "gesellschaftliche Transformation", "Systemresilienz"],
                  "keywords": "Resilienz, Widerstandskraft, Psychologie, Neurobiologie, Polykrise, gesellschaftliche Transformation, Systemresilienz",
                  "isPartOf": {"@type": "WebSite", "@id": f"{SITE}/#website", "name": "Alexander Forum"},
                  "license": "https://creativecommons.org/licenses/by-nc-sa/4.0/",
                  "encoding": {"@type": "MediaObject", "contentUrl": f"{SITE}/downloads/AF_Resilienz_Grundlagendossier_PUBLIC_v1.1.pdf", "encodingFormat": "application/pdf"},
              },
              "en/resilience/index.html": {
                  "@context": "https://schema.org",
                  "@type": ["Article", "Report"],
                  "@id": f"{SITE}/en/resilience/#dossier",
                  "url": f"{SITE}/en/resilience/",
                  "headline": "Resilience – Interdisciplinary Analysis and Future Competency",
                  "description": "Interdisciplinary foundation dossier on resilience: from neurobiological foundations to psychological development and societal transformation.",
                  "author": {"@type": "Organization", "name": "Alexander Forum for Reflection & Resilience", "url": f"{SITE}/"},
                  "publisher": {"@type": "Organization", "name": "Alexander Forum for Reflection & Resilience", "url": f"{SITE}/", "logo": {"@type": "ImageObject", "url": f"{SITE}/AF-Logo-final.svg"}},
                  "datePublished": "2025-10-01",
                  "dateModified": TODAY,
                  "inLanguage": "en",
                  "about": ["resilience", "psychology", "neurobiology", "societal transformation", "systems resilience"],
                  "keywords": "resilience, psychology, neurobiology, polycrisis, societal transformation, systems resilience",
                  "isPartOf": {"@type": "WebSite", "@id": f"{SITE}/#website", "name": "Alexander Forum"},
                  "license": "https://creativecommons.org/licenses/by-nc-sa/4.0/",
                  "encoding": {"@type": "MediaObject", "contentUrl": f"{SITE}/downloads/AF_Resilienz_Grundlagendossier_PUBLIC_v1.1.pdf", "encodingFormat": "application/pdf"},
              },
              "gleichzeitigkeit/index.html": {
                  "@context": "https://schema.org",
                  "@type": ["Article", "Report"],
                  "@id": f"{SITE}/gleichzeitigkeit/#dossier",
                  "url": f"{SITE}/gleichzeitigkeit/",
                  "headline": "Die Ära der Gleichzeitigkeit",
                  "description": "Dossier II über die Logik multipler Krisen und die Grenzen der Anpassung: Analyse zu Polykrise, Strukturproblemen und gesellschaftlicher Transformation.",
                  "author": {"@type": "Organization", "name": "Alexander Forum für Reflexion & Resilienz", "url": f"{SITE}/"},
                  "publisher": {"@type": "Organization", "name": "Alexander Forum für Reflexion & Resilienz", "url": f"{SITE}/", "logo": {"@type": "ImageObject", "url": f"{SITE}/AF-Logo-final.svg"}},
                  "datePublished": "2025-11-01",
                  "dateModified": TODAY,
                  "inLanguage": "de-AT",
                  "about": ["Polykrise", "Gleichzeitigkeit", "gesellschaftliche Transformation", "Systemkrisen", "Resilienz"],
                  "keywords": "Polykrise, Ära der Gleichzeitigkeit, Systemkrisen, gesellschaftliche Transformation, Resilienz, Anpassung",
                  "isPartOf": {"@type": "WebSite", "@id": f"{SITE}/#website", "name": "Alexander Forum"},
                  "license": "https://creativecommons.org/licenses/by-nc-sa/4.0/",
                  "encoding": {"@type": "MediaObject", "contentUrl": f"{SITE}/gleichzeitigkeit/AF_Die_Aera_der_Gleichzeitigkeit.pdf", "encodingFormat": "application/pdf"},
              },
              "en/era-of-simultaneity/index.html": {
                  "@context": "https://schema.org",
                  "@type": ["Article", "Report"],
                  "@id": f"{SITE}/en/era-of-simultaneity/#dossier",
                  "url": f"{SITE}/en/era-of-simultaneity/",
                  "headline": "The Era of Simultaneity",
                  "description": "Dossier II on the logic of multiple crises and the limits of adaptation, currently available in German only.",
                  "author": {"@type": "Organization", "name": "Alexander Forum for Reflection & Resilience", "url": f"{SITE}/"},
                  "publisher": {"@type": "Organization", "name": "Alexander Forum for Reflection & Resilience", "url": f"{SITE}/", "logo": {"@type": "ImageObject", "url": f"{SITE}/AF-Logo-final.svg"}},
                  "datePublished": "2025-11-01",
                  "dateModified": TODAY,
                  "inLanguage": "en",
                  "about": ["polycrisis", "simultaneity", "societal transformation", "systemic crises", "resilience"],
                  "keywords": "polycrisis, era of simultaneity, systemic crises, societal transformation, resilience, adaptation",
                  "isPartOf": {"@type": "WebSite", "@id": f"{SITE}/#website", "name": "Alexander Forum"},
                  "license": "https://creativecommons.org/licenses/by-nc-sa/4.0/",
                  "encoding": {"@type": "MediaObject", "contentUrl": f"{SITE}/gleichzeitigkeit/AF_Die_Aera_der_Gleichzeitigkeit.pdf", "encodingFormat": "application/pdf"},
              },
          }

          alternate_line = re.compile(r'^\s*<link\s+rel=["\']alternate["\'][^>]*hreflang=["\'](?:de|en|x-default)["\'][^>]*>\s*\n?', re.MULTILINE)

          def hreflang_block(meta):
              de_href = meta["self"] if meta["self_lang"] == "de" else meta["other"]
              en_href = meta["self"] if meta["self_lang"] == "en" else meta["other"]
              return (
                  f'  <link rel="alternate" href="{de_href}" hreflang="de">\n'
                  f'  <link rel="alternate" href="{en_href}" hreflang="en">\n'
                  f'  <link rel="alternate" href="{meta["x_default"]}" hreflang="x-default">\n'
              )

          def schema_block(schema):
              data = json.dumps(schema, ensure_ascii=False, indent=2)
              return f'\n  <script type="application/ld+json">\n{data}\n  </script>\n'

          for path_str, meta in pairs.items():
              path = Path(path_str)
              if not path.exists():
                  print(f"Skipping missing file: {path_str}")
                  continue

              text = path.read_text(encoding="utf-8")
              original = text

              text = alternate_line.sub('', text)
              block = hreflang_block(meta)
              canonical_match = re.search(r'(^\s*<link\s+rel=["\']canonical["\'][^>]*>\s*\n)', text, re.MULTILINE)
              if canonical_match:
                  insert_at = canonical_match.end()
                  text = text[:insert_at] + block + text[insert_at:]
              elif '</head>' in text:
                  text = text.replace('</head>', block + '</head>', 1)

              text = re.sub(
                  r'(<a\s+class="lang"\s+href=")[^"]+("\s+hreflang=")[^"]+("\s+aria-label=")[^"]+(">)(.*?)(</a>)',
                  lambda m: f'{m.group(1)}{meta["switch_href"]}{m.group(2)}{meta["switch_lang"]}{m.group(3)}{meta["switch_label"]}{m.group(4)}{meta["switch_text"]}{m.group(6)}',
                  text,
                  count=1,
              )

              if path_str in schemas and 'application/ld+json' not in text:
                  marker = '  <style>'
                  if marker in text:
                      text = text.replace(marker, schema_block(schemas[path_str]) + '\n' + marker, 1)
                  else:
                      text = text.replace('</head>', schema_block(schemas[path_str]) + '</head>', 1)

              if text != original:
                  path.write_text(text, encoding="utf-8")
                  print(f"Patched {path_str}")
              else:
                  print(f"No changes needed for {path_str}")

          workflow = Path('.github/workflows/one-time-seo-fix.yml')
          if workflow.exists():
              workflow.unlink()
              print('Removed one-time workflow file')
          PY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Fix hreflang and dossier structured data [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
