name: One-time SEO cleanup

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: contains(github.event.head_commit.message, '[seo-fix]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove leftover relative hreflang alternates and trigger file
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          pattern = re.compile(r'^\s*<link\s+rel=["\']alternate["\']\s+href=["\']/[^"\']+["\']\s+hreflang=["\'](?:de|en|x-default)["\']\s*>\s*\n?', re.MULTILINE)
          for path in [Path('resilienz/index.html'), Path('en/resilience/index.html')]:
              text = path.read_text(encoding='utf-8')
              new = pattern.sub('', text)
              if new != text:
                  path.write_text(new, encoding='utf-8')
                  print(f'Cleaned {path}')
          for path in [Path('.seo-fix-trigger'), Path('.github/workflows/one-time-cleanup.yml')]:
              if path.exists():
                  path.unlink()
                  print(f'Removed {path}')
          PY
      - name: Commit and push cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Clean up SEO fix artifacts [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
